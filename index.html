<!DOCTYPE html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700;900&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <meta name="application-name" content="Lazy Sprout" />
    <meta name="description" content="Beginner garden tracker by Lazy Brie. Track watering, sprouting, and plant growth — without the guesswork." />
    <meta name="keywords" content="garden tracker, beginner gardening, milk jug garden, container gardening, plant tracker, watering reminder" />
    <meta name="author" content="Lazy Brie" />

    <!-- Theme -->
    <meta name="theme-color" content="#43a047" />
    <meta name="msapplication-TileColor" content="#43a047" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lazy Sprout" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lazy Sprout — Beginner Garden Tracker" />
    <meta property="og:description" content="Track watering, sprouting, and plant growth without the guesswork. By Lazy Brie." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <title>Lazy Sprout 🌱</title>
    <style>
      body { margin: 0; padding: 0; background: #e8f5e9; -webkit-tap-highlight-color: transparent; }
      button { touch-action: manipulation; }
      * { -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Lazy Sprout SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
